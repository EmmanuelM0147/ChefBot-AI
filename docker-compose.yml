services:
  postgres:
    image: postgres:16-alpine
    container_name: chefbot-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chefbot_monitoring
    ports:
      - "5433:5432"
    volumes:
      - chefbot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d chefbot_monitoring"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  chefbot_pgdata:
